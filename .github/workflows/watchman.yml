name: Account Watchman

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🦀 Rust Kur
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: 🔨 Watchman'ı Çalıştır
        env:
          # BURASI DEĞİŞTİ: Artık senin gerçek PAT'ini kullanıyor
          GITHUB_TOKEN: ${{ secrets.WATCHMAN_TOKEN }}
        run: cargo run --release
