name: Account Watchman

on:
  schedule:
    - cron: '*/5 * * * *' # Her 5 dakikada bir çalışır
  workflow_dispatch:      # GitHub üzerinden manuel başlatabilmeni sağlar

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: 🦀 Rust Kur
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: 🔨 Watchman'ı Çalıştır
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo run --release
